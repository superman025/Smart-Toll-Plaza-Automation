spring.application.name=APIGateway

server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=vehicleAPI
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/vehicles/**

spring.cloud.gateway.server.webmvc.routes[1].id=walletAPI
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/wallets/**

spring.cloud.gateway.server.webmvc.routes[2].id=journeyAPI
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/journies/**

spring.cloud.gateway.server.webmvc.routes[3].id=tollAPI
spring.cloud.gateway.server.webmvc.routes[3].uri = http://localhost:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/tolls/**